# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║  Teardown Test Environment                                                 ║
# ║  DANGER: Destroys all test infrastructure. HTTPS cert is preserved.        ║
# ╚══════════════════════════════════════════════════════════════════════════════╝

name: Teardown Test Environment

on:
  workflow_dispatch:
    inputs:
      confirm_teardown:
        description: 'Type "DESTROY TEST" to confirm'
        required: true
        type: string

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ secrets.AWS_REGION || 'us-east-1' }}
  ENVIRONMENT: test
  PROJECT_NAME: ${{ vars.PROJECT_NAME || 'static-site' }}

jobs:
  teardown:
    name: Teardown Test Environment
    runs-on: ubuntu-latest
    environment: test
    if: github.event.inputs.confirm_teardown == 'DESTROY TEST'

    steps:
      - name: Validate confirmation
        run: echo "✅ Teardown confirmed for TEST environment"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # ── 1. Delete CloudFront Distribution ────────────────────────
      - name: Delete CloudFront distribution
        run: |
          echo "🗑️  Deleting CloudFront distribution..."
          APP_NAME="${PROJECT_NAME}-${ENVIRONMENT}"

          CF_DIST_ID=$(aws cloudfront list-distributions \
            --query "DistributionList.Items[?Comment=='${APP_NAME}'].Id | [0]" \
            --output text 2>/dev/null || echo "")

          if [[ -n "$CF_DIST_ID" && "$CF_DIST_ID" != "None" ]]; then
            # Disable first (required before deletion)
            ETAG=$(aws cloudfront get-distribution-config --id "$CF_DIST_ID" \
              --query "ETag" --output text)
            CONFIG=$(aws cloudfront get-distribution-config --id "$CF_DIST_ID" \
              --query "DistributionConfig" --output json)
            DISABLED_CONFIG=$(echo "$CONFIG" | jq '.Enabled = false')

            aws cloudfront update-distribution --id "$CF_DIST_ID" \
              --distribution-config "$DISABLED_CONFIG" --if-match "$ETAG" \
              --no-cli-pager >/dev/null 2>&1 || true
            echo "  ⏳ Disabled, waiting for propagation..."

            for i in {1..60}; do
              STATUS=$(aws cloudfront get-distribution --id "$CF_DIST_ID" \
                --query "Distribution.Status" --output text 2>/dev/null || echo "Unknown")
              if [[ "$STATUS" == "Deployed" ]]; then break; fi
              echo "  ⏳ Waiting... ($i/60)"
              sleep 30
            done

            ETAG=$(aws cloudfront get-distribution --id "$CF_DIST_ID" \
              --query "ETag" --output text 2>/dev/null || echo "")
            aws cloudfront delete-distribution --id "$CF_DIST_ID" \
              --if-match "$ETAG" 2>/dev/null || true
            echo "  ✅ Deleted CloudFront distribution: ${CF_DIST_ID}"
          else
            echo "  ⏭️  Not found — skipping"
          fi

          # Delete OAC
          OAC_ID=$(aws cloudfront list-origin-access-controls \
            --query "OriginAccessControlList.Items[?Name=='${APP_NAME}-oac'].Id | [0]" \
            --output text 2>/dev/null || echo "")
          if [[ -n "$OAC_ID" && "$OAC_ID" != "None" ]]; then
            ETAG=$(aws cloudfront get-origin-access-control --id "$OAC_ID" \
              --query "ETag" --output text 2>/dev/null || echo "")
            aws cloudfront delete-origin-access-control --id "$OAC_ID" \
              --if-match "$ETAG" 2>/dev/null || true
            echo "  ✅ Deleted OAC: ${OAC_ID}"
          fi

      # ── 2. Delete S3 Bucket ──────────────────────────────────────
      - name: Delete S3 bucket
        run: |
          echo "🗑️  Deleting S3 bucket..."
          S3_BUCKET="${PROJECT_NAME}-${ENVIRONMENT}-frontend"

          if aws s3api head-bucket --bucket "$S3_BUCKET" 2>/dev/null; then
            # Empty all versions (versioned bucket)
            aws s3api list-object-versions --bucket "$S3_BUCKET" --output json \
              | jq -r '.Versions[]? | "aws s3api delete-object --bucket '"$S3_BUCKET"' --key \"\(.Key)\" --version-id \"\(.VersionId)\""' \
              | while read -r cmd; do eval "$cmd" 2>/dev/null || true; done

            aws s3api list-object-versions --bucket "$S3_BUCKET" --output json \
              | jq -r '.DeleteMarkers[]? | "aws s3api delete-object --bucket '"$S3_BUCKET"' --key \"\(.Key)\" --version-id \"\(.VersionId)\""' \
              | while read -r cmd; do eval "$cmd" 2>/dev/null || true; done

            aws s3 rm "s3://${S3_BUCKET}" --recursive 2>/dev/null || true
            aws s3api delete-bucket --bucket "$S3_BUCKET" --region "$AWS_REGION" 2>/dev/null || true
            echo "  ✅ Deleted S3 bucket: ${S3_BUCKET}"
          else
            echo "  ⏭️  Not found — skipping"
          fi

      # ── 3. Delete DNS Record ─────────────────────────────────────
      - name: Delete DNS record
        env:
          CUSTOM_DOMAIN: ${{ secrets.TEST_DOMAIN || '' }}
        run: |
          if [[ -z "$CUSTOM_DOMAIN" ]]; then
            echo "  ⏭️  No TEST_DOMAIN — skipping DNS"
            exit 0
          fi

          FULL_DOMAIN="test.${CUSTOM_DOMAIN}"

          ZONE_ID=$(aws route53 list-hosted-zones-by-name \
            --query "HostedZones[?Name=='${CUSTOM_DOMAIN}.'].Id" \
            --output text 2>/dev/null | cut -d'/' -f3 || echo "")

          if [[ -z "$ZONE_ID" || "$ZONE_ID" == "None" ]]; then
            echo "  ⏭️  No hosted zone — skipping"
            exit 0
          fi

          # Get current record target
          RECORD_JSON=$(aws route53 list-resource-record-sets \
            --hosted-zone-id "$ZONE_ID" \
            --query "ResourceRecordSets[?Name=='${FULL_DOMAIN}.'] | [0]" \
            --output json 2>/dev/null || echo "null")

          if [[ "$RECORD_JSON" != "null" && -n "$RECORD_JSON" ]]; then
            CHANGE_BATCH="{\"Changes\":[{\"Action\":\"DELETE\",\"ResourceRecordSet\":${RECORD_JSON}}]}"
            aws route53 change-resource-record-sets \
              --hosted-zone-id "$ZONE_ID" --change-batch "$CHANGE_BATCH" 2>/dev/null || true
            echo "  ✅ Deleted DNS: ${FULL_DOMAIN}"
          else
            echo "  ⏭️  No DNS record found"
          fi

      # ── Summary ──────────────────────────────────────────────────
      - name: Teardown summary
        if: always()
        run: |
          echo "## Test Environment Teardown Complete" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Resource | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|----------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| CloudFront Distribution | 🗑️ Deleted |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Origin Access Control | 🗑️ Deleted |" >> "$GITHUB_STEP_SUMMARY"
          echo "| S3 Bucket | 🗑️ Deleted |" >> "$GITHUB_STEP_SUMMARY"
          echo "| DNS Record | 🗑️ Deleted |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Preserved:** ACM certificates, Route 53 hosted zone" >> "$GITHUB_STEP_SUMMARY"
