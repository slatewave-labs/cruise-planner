# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║  Setup Production Environment — S3 + CloudFront + OAC                      ║
# ║  Provisions infrastructure from scratch. Self-healing: skips existing.     ║
# ╚══════════════════════════════════════════════════════════════════════════════╝

name: Setup Production Environment

on:
  workflow_dispatch: {}

concurrency:
  group: setup-prod
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ secrets.AWS_REGION || 'us-east-1' }}
  ENVIRONMENT: prod
  PROJECT_NAME: ${{ vars.PROJECT_NAME || 'static-site' }}

jobs:
  setup:
    name: Provision Production Infrastructure
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set variables
        id: vars
        run: |
          APP_NAME="${PROJECT_NAME}-${ENVIRONMENT}"
          S3_BUCKET="${APP_NAME}-frontend"
          echo "app_name=${APP_NAME}" >> "$GITHUB_OUTPUT"
          echo "s3_bucket=${S3_BUCKET}" >> "$GITHUB_OUTPUT"

      # ── 1. S3 Bucket ─────────────────────────────────────────────
      - name: Create S3 bucket
        env:
          S3_BUCKET: ${{ steps.vars.outputs.s3_bucket }}
        run: |
          echo "📦 Creating S3 bucket: ${S3_BUCKET}"

          if aws s3api head-bucket --bucket "$S3_BUCKET" 2>/dev/null; then
            echo "  ⏭️  Bucket already exists"
          else
            if [[ "$AWS_REGION" == "us-east-1" ]]; then
              aws s3api create-bucket --bucket "$S3_BUCKET" --region "$AWS_REGION"
            else
              aws s3api create-bucket --bucket "$S3_BUCKET" --region "$AWS_REGION" \
                --create-bucket-configuration LocationConstraint="$AWS_REGION"
            fi
            echo "  ✅ Created S3 bucket"
          fi

          # Block all public access (CloudFront OAC handles access)
          aws s3api put-public-access-block --bucket "$S3_BUCKET" \
            --public-access-block-configuration \
            "BlockPublicAcls=true,IgnorePublicAcls=true,BlockPublicPolicy=true,RestrictPublicBuckets=true"

          # Enable versioning for rollback capability
          aws s3api put-bucket-versioning --bucket "$S3_BUCKET" \
            --versioning-configuration Status=Enabled

          # Tag the bucket
          aws s3api put-bucket-tagging --bucket "$S3_BUCKET" \
            --tagging "TagSet=[{Key=Project,Value=${PROJECT_NAME}},{Key=Environment,Value=${ENVIRONMENT}}]"

          # Configure default encryption
          aws s3api put-bucket-encryption --bucket "$S3_BUCKET" \
            --server-side-encryption-configuration \
            '{"Rules":[{"ApplyServerSideEncryptionByDefault":{"SSEAlgorithm":"AES256"}}]}'

          echo "  ✅ Bucket configured (private, versioned, encrypted)"

      # ── 2. CloudFront OAC ────────────────────────────────────────
      - name: Create CloudFront Origin Access Control
        id: oac
        env:
          APP_NAME: ${{ steps.vars.outputs.app_name }}
        run: |
          OAC_NAME="${APP_NAME}-oac"
          OAC_ID=$(aws cloudfront list-origin-access-controls \
            --query "OriginAccessControlList.Items[?Name=='${OAC_NAME}'].Id | [0]" \
            --output text 2>/dev/null || echo "")

          if [[ -n "$OAC_ID" && "$OAC_ID" != "None" ]]; then
            echo "  ⏭️  OAC already exists: ${OAC_ID}"
          else
            OAC_ID=$(aws cloudfront create-origin-access-control \
              --origin-access-control-config \
              "Name=${OAC_NAME},Description=OAC for ${APP_NAME},SigningProtocol=sigv4,SigningBehavior=always,OriginAccessControlOriginType=s3" \
              --query "OriginAccessControl.Id" --output text)
            echo "  ✅ Created OAC: ${OAC_ID}"
          fi
          echo "oac_id=${OAC_ID}" >> "$GITHUB_OUTPUT"

      # ── 3. CloudFront Distribution ───────────────────────────────
      - name: Create CloudFront distribution
        id: cf
        env:
          S3_BUCKET: ${{ steps.vars.outputs.s3_bucket }}
          APP_NAME: ${{ steps.vars.outputs.app_name }}
          OAC_ID: ${{ steps.oac.outputs.oac_id }}
          CUSTOM_DOMAIN: ${{ secrets.PROD_DOMAIN || '' }}
          ACM_CERT_ARN: ${{ secrets.PROD_ACM_CERT_ARN || '' }}
        run: |
          CF_DIST_ID=$(aws cloudfront list-distributions \
            --query "DistributionList.Items[?Comment=='${APP_NAME}'].Id | [0]" \
            --output text 2>/dev/null || echo "")

          if [[ -n "$CF_DIST_ID" && "$CF_DIST_ID" != "None" ]]; then
            echo "  ⏭️  CloudFront distribution already exists: ${CF_DIST_ID}"
            CF_DOMAIN=$(aws cloudfront get-distribution --id "$CF_DIST_ID" \
              --query "Distribution.DomainName" --output text)
            echo "cf_dist_id=${CF_DIST_ID}" >> "$GITHUB_OUTPUT"
            echo "cf_domain=${CF_DOMAIN}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          S3_ORIGIN="${S3_BUCKET}.s3.${AWS_REGION}.amazonaws.com"

          # Build aliases and viewer certificate
          if [[ -n "$CUSTOM_DOMAIN" && -n "$ACM_CERT_ARN" ]]; then
            ALIASES="{\"Quantity\":1,\"Items\":[\"${CUSTOM_DOMAIN}\"]}"
            VIEWER_CERT="{\"ACMCertificateArn\":\"${ACM_CERT_ARN}\",\"SSLSupportMethod\":\"sni-only\",\"MinimumProtocolVersion\":\"TLSv1.2_2021\",\"CloudFrontDefaultCertificate\":false}"
          else
            ALIASES="{\"Quantity\":0}"
            VIEWER_CERT="{\"CloudFrontDefaultCertificate\":true}"
          fi

          CF_CONFIG=$(cat <<CFEOF
          {
            "CallerReference": "${APP_NAME}-$(date +%s)",
            "Comment": "${APP_NAME}",
            "Enabled": true,
            "DefaultRootObject": "index.html",
            "Origins": {
              "Quantity": 1,
              "Items": [{
                "Id": "S3-${S3_BUCKET}",
                "DomainName": "${S3_ORIGIN}",
                "OriginAccessControlId": "${OAC_ID}",
                "S3OriginConfig": { "OriginAccessIdentity": "" }
              }]
            },
            "DefaultCacheBehavior": {
              "TargetOriginId": "S3-${S3_BUCKET}",
              "ViewerProtocolPolicy": "redirect-to-https",
              "AllowedMethods": { "Quantity": 2, "Items": ["GET", "HEAD"] },
              "CachedMethods": { "Quantity": 2, "Items": ["GET", "HEAD"] },
              "Compress": true,
              "ForwardedValues": {
                "QueryString": false,
                "Cookies": { "Forward": "none" }
              },
              "MinTTL": 0,
              "DefaultTTL": 86400,
              "MaxTTL": 31536000
            },
            "CustomErrorResponses": {
              "Quantity": 1,
              "Items": [{
                "ErrorCode": 403,
                "ResponseCode": "200",
                "ResponsePagePath": "/index.html",
                "ErrorCachingMinTTL": 10
              }]
            },
            "Aliases": ${ALIASES},
            "ViewerCertificate": ${VIEWER_CERT},
            "PriceClass": "PriceClass_All",
            "HttpVersion": "http2and3"
          }
          CFEOF
          )

          CF_OUTPUT=$(aws cloudfront create-distribution \
            --distribution-config "$CF_CONFIG" \
            --output json)

          CF_DIST_ID=$(echo "$CF_OUTPUT" | jq -r '.Distribution.Id')
          CF_DOMAIN=$(echo "$CF_OUTPUT" | jq -r '.Distribution.DomainName')

          echo "  ✅ Created CloudFront distribution: ${CF_DIST_ID}"
          echo "  📡 Domain: ${CF_DOMAIN}"
          echo "cf_dist_id=${CF_DIST_ID}" >> "$GITHUB_OUTPUT"
          echo "cf_domain=${CF_DOMAIN}" >> "$GITHUB_OUTPUT"

      # ── 4. S3 Bucket Policy (allow CloudFront OAC) ──────────────
      - name: Configure S3 bucket policy for CloudFront
        env:
          S3_BUCKET: ${{ steps.vars.outputs.s3_bucket }}
          CF_DIST_ID: ${{ steps.cf.outputs.cf_dist_id }}
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          BUCKET_POLICY=$(cat <<BPEOF
          {
            "Version": "2012-10-17",
            "Statement": [{
              "Sid": "AllowCloudFrontOAC",
              "Effect": "Allow",
              "Principal": { "Service": "cloudfront.amazonaws.com" },
              "Action": "s3:GetObject",
              "Resource": "arn:aws:s3:::${S3_BUCKET}/*",
              "Condition": {
                "StringEquals": {
                  "AWS:SourceArn": "arn:aws:cloudfront::${ACCOUNT_ID}:distribution/${CF_DIST_ID}"
                }
              }
            }]
          }
          BPEOF
          )

          aws s3api put-bucket-policy --bucket "$S3_BUCKET" --policy "$BUCKET_POLICY"
          echo "  ✅ S3 bucket policy configured for CloudFront OAC"

      # ── 5. DNS Record (optional) ────────────────────────────────
      - name: Configure DNS
        env:
          CUSTOM_DOMAIN: ${{ secrets.PROD_DOMAIN || '' }}
          CF_DOMAIN: ${{ steps.cf.outputs.cf_domain }}
        run: |
          if [[ -z "$CUSTOM_DOMAIN" ]]; then
            echo "  ⏭️  No PROD_DOMAIN secret — skipping DNS"
            exit 0
          fi

          ZONE_ID=$(aws route53 list-hosted-zones-by-name \
            --query "HostedZones[?Name=='${CUSTOM_DOMAIN}.'].Id" \
            --output text 2>/dev/null | cut -d'/' -f3 || echo "")

          if [[ -z "$ZONE_ID" || "$ZONE_ID" == "None" ]]; then
            echo "  ⚠️  No Route 53 hosted zone for ${CUSTOM_DOMAIN} — skipping DNS"
            exit 0
          fi

          CHANGE_BATCH=$(cat <<DNSEOF
          {
            "Changes": [{
              "Action": "UPSERT",
              "ResourceRecordSet": {
                "Name": "${CUSTOM_DOMAIN}",
                "Type": "A",
                "AliasTarget": {
                  "HostedZoneId": "Z2FDTNDATAQYW2",
                  "DNSName": "${CF_DOMAIN}",
                  "EvaluateTargetHealth": false
                }
              }
            }]
          }
          DNSEOF
          )

          aws route53 change-resource-record-sets \
            --hosted-zone-id "$ZONE_ID" --change-batch "$CHANGE_BATCH"
          echo "  ✅ DNS record created: ${CUSTOM_DOMAIN} → ${CF_DOMAIN}"

      # ── 6. Initial Deploy ────────────────────────────────────────
      - name: Build and deploy site
        env:
          S3_BUCKET: ${{ steps.vars.outputs.s3_bucket }}
          CUSTOM_DOMAIN: ${{ secrets.PROD_DOMAIN || '' }}
          CF_DOMAIN: ${{ steps.cf.outputs.cf_domain }}
          CF_DIST_ID: ${{ steps.cf.outputs.cf_dist_id }}
        run: |
          if [[ -n "$CUSTOM_DOMAIN" ]]; then
            SITE_URL="https://${CUSTOM_DOMAIN}"
          elif [[ -n "$CF_DOMAIN" ]]; then
            SITE_URL="https://${CF_DOMAIN}"
          else
            SITE_URL=""
          fi

          cd frontend
          yarn install --frozen-lockfile
          REACT_APP_SITE_URL="$SITE_URL" CI=true yarn build
          cd ..

          aws s3 sync frontend/build/ "s3://${S3_BUCKET}/" \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "index.html" --exclude "asset-manifest.json" \
            --region "$AWS_REGION"

          aws s3 cp frontend/build/index.html "s3://${S3_BUCKET}/index.html" \
            --cache-control "no-cache, no-store, must-revalidate" \
            --content-type "text/html" --region "$AWS_REGION"

          echo "  ✅ Initial deployment complete"

          if [[ -n "$CF_DIST_ID" && "$CF_DIST_ID" != "None" ]]; then
            aws cloudfront create-invalidation \
              --distribution-id "$CF_DIST_ID" --paths "/*" > /dev/null
            echo "  🔄 CloudFront invalidation created"
          fi

      # ── Summary ──────────────────────────────────────────────────
      - name: Setup summary
        if: always()
        env:
          S3_BUCKET: ${{ steps.vars.outputs.s3_bucket }}
          CF_DIST_ID: ${{ steps.cf.outputs.cf_dist_id }}
          CF_DOMAIN: ${{ steps.cf.outputs.cf_domain }}
          CUSTOM_DOMAIN: ${{ secrets.PROD_DOMAIN || '' }}
        run: |
          if [[ -n "$CUSTOM_DOMAIN" ]]; then
            SITE_URL="https://${CUSTOM_DOMAIN}"
          elif [[ -n "$CF_DOMAIN" ]]; then
            SITE_URL="https://${CF_DOMAIN}"
          else
            SITE_URL="(pending CloudFront deployment)"
          fi

          echo "## Production Environment Setup Complete" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Resource | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|----------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| S3 Bucket | \`${S3_BUCKET}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| CloudFront ID | \`${CF_DIST_ID}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Site URL | ${SITE_URL} |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Next:** Push a version tag (\`v1.0.0\`) to trigger production deployment." >> "$GITHUB_STEP_SUMMARY"
