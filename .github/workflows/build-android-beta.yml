name: Build Android (Beta)

# Build and optionally upload a signed APK/AAB for internal testing.
# Uses Bubblewrap to wrap the PWA as a Trusted Web Activity (TWA).

on:
  workflow_dispatch:
    inputs:
      version_name:
        description: "Version name (e.g. 1.0.0-beta.1)"
        required: true
        default: "1.0.0-beta.1"
        type: string
      version_code:
        description: "Version code (integer, must increase on each upload)"
        required: true
        default: "1"
        type: string
      upload_to_play:
        description: "Upload AAB to Google Play internal test track"
        required: false
        default: "false"
        type: boolean

concurrency:
  group: android-beta-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: "20"

jobs:
  build-android-beta:
    name: Build Android TWA (Beta)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: yarn
          cache-dependency-path: frontend/yarn.lock

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install frontend dependencies
        run: |
          cd frontend
          yarn install --frozen-lockfile

      - name: Build frontend (production)
        run: |
          cd frontend
          yarn build
        env:
          REACT_APP_BACKEND_URL: ${{ secrets.TEST_BACKEND_URL || 'https://api.test.shoreexplorer.com' }}
          REACT_APP_SITE_URL: ${{ secrets.TEST_SITE_URL || 'https://test.shoreexplorer.com' }}
          REACT_APP_GA_MEASUREMENT_ID: ${{ secrets.TEST_GA_MEASUREMENT_ID }}
          CI: true

      - name: Install Bubblewrap
        run: npm install -g @nicolo-ribaudo/bubblewrap

      - name: Update TWA manifest versions
        env:
          VERSION_NAME: ${{ inputs.version_name }}
          VERSION_CODE: ${{ inputs.version_code }}
          TEST_SITE_HOST: ${{ secrets.TEST_SITE_HOST }}
        run: |
          # Update version in twa-manifest.json
          python3 -c "
          import json, os
          with open('twa-manifest.json', 'r') as f:
              manifest = json.load(f)
          manifest['appVersionName'] = os.environ['VERSION_NAME']
          manifest['appVersionCode'] = int(os.environ['VERSION_CODE'])
          # Use test host if available
          test_host = os.environ.get('TEST_SITE_HOST', '')
          if test_host:
              manifest['host'] = test_host
          with open('twa-manifest.json', 'w') as f:
              json.dump(manifest, f, indent=2)
          print(f'Updated to v{manifest[\"appVersionName\"]} (code {manifest[\"appVersionCode\"]})')
          "

      - name: Decode signing keystore
        if: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android.keystore
          echo "✅ Keystore decoded"

      - name: Build TWA (signed)
        if: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
        run: |
          bubblewrap build \
            --skipPwaValidation \
            --signingKeyPath ./android.keystore \
            --signingKeyAlias "${{ secrets.ANDROID_KEY_ALIAS || 'shoreexplorer' }}"
        env:
          BUBBLEWRAP_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          BUBBLEWRAP_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Build TWA (unsigned — no keystore)
        if: ${{ secrets.ANDROID_KEYSTORE_BASE64 == '' }}
        run: |
          echo "⚠️  No signing keystore configured. Building unsigned APK for testing."
          bubblewrap build --skipPwaValidation

      - name: List build outputs
        run: |
          echo "=== Build outputs ==="
          ls -lh *.apk *.aab 2>/dev/null || echo "No APK/AAB found in root"
          ls -lh app/build/outputs/**/*.apk app/build/outputs/**/*.aab 2>/dev/null || echo "No outputs in app/build/"
          find . -name "*.apk" -o -name "*.aab" | head -20

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: shoreexplorer-beta-${{ inputs.version_name }}
          path: |
            *.apk
            *.aab
            app/build/outputs/**/*.apk
            app/build/outputs/**/*.aab
          retention-days: 30

      - name: Upload AAB to Google Play (internal test track)
        if: ${{ inputs.upload_to_play == 'true' && secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON != '' }}
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.shoreexplorer.app
          releaseFiles: "*.aab"
          track: internal
          status: draft
          releaseName: "Beta ${{ inputs.version_name }}"

      - name: Build summary
        if: always()
        env:
          VERSION_NAME: ${{ inputs.version_name }}
          VERSION_CODE: ${{ inputs.version_code }}
          UPLOAD_TO_PLAY: ${{ inputs.upload_to_play }}
        run: |
          echo "## 🤖 Android Beta Build Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Property | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|----------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Version | ${VERSION_NAME} (code ${VERSION_CODE}) |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Package | com.shoreexplorer.app |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Track | Internal test |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Upload to Play | ${UPLOAD_TO_PLAY} |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          if ls *.aab *.apk 2>/dev/null; then
            echo "✅ Build artifacts created successfully" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "❌ No build artifacts found" >> "$GITHUB_STEP_SUMMARY"
          fi
