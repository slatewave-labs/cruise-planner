# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║  Deploy to Production — S3 + CloudFront                                    ║
# ║  Triggered by version tags (v*) or manual dispatch                         ║
# ╚══════════════════════════════════════════════════════════════════════════════╝

name: Deploy to Production

on:
  push:
    tags:
      - "v*"

  workflow_dispatch: {}

concurrency:
  group: deploy-prod-${{ github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ secrets.AWS_REGION || 'us-east-1' }}
  ENVIRONMENT: prod
  PROJECT_NAME: ${{ vars.PROJECT_NAME || 'static-site' }}

jobs:
  # ── CI Validation ───────────────────────────────────────────────
  ci-check:
    name: CI Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "yarn"
          cache-dependency-path: frontend/yarn.lock

      - name: Install dependencies
        run: |
          cd frontend
          yarn install --frozen-lockfile

      - name: Lint
        run: cd frontend && yarn lint

      - name: Test
        run: |
          cd frontend
          yarn test --watchAll=false --ci
        env:
          CI: true

      - name: Build
        run: |
          cd frontend
          yarn build
        env:
          CI: true

  # ── Check Infrastructure ────────────────────────────────────────
  check-env:
    name: Check Infrastructure
    runs-on: ubuntu-latest
    environment: production
    outputs:
      deployed: ${{ steps.check.outputs.deployed }}
      site_url: ${{ steps.check.outputs.site_url }}
      s3_bucket: ${{ steps.check.outputs.s3_bucket }}
      cf_dist_id: ${{ steps.check.outputs.cf_dist_id }}

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Check S3 bucket and CloudFront
        id: check
        env:
          CUSTOM_DOMAIN: ${{ secrets.PROD_DOMAIN || '' }}
        run: |
          APP_NAME="${PROJECT_NAME}-${ENVIRONMENT}"
          S3_BUCKET="${APP_NAME}-frontend"

          if ! aws s3api head-bucket --bucket "$S3_BUCKET" 2>/dev/null; then
            echo "⏭️  S3 bucket not found. Run setup-prod first."
            echo "deployed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "deployed=true" >> "$GITHUB_OUTPUT"
          echo "s3_bucket=${S3_BUCKET}" >> "$GITHUB_OUTPUT"

          CF_DIST_ID=$(aws cloudfront list-distributions \
            --query "DistributionList.Items[?Comment=='${APP_NAME}'].Id | [0]" \
            --output text 2>/dev/null || echo "")
          CF_DOMAIN=$(aws cloudfront list-distributions \
            --query "DistributionList.Items[?Comment=='${APP_NAME}'].DomainName | [0]" \
            --output text 2>/dev/null || echo "")

          echo "cf_dist_id=${CF_DIST_ID}" >> "$GITHUB_OUTPUT"

          if [[ -n "$CUSTOM_DOMAIN" ]]; then
            echo "site_url=https://${CUSTOM_DOMAIN}" >> "$GITHUB_OUTPUT"
          elif [[ -n "$CF_DOMAIN" && "$CF_DOMAIN" != "None" ]]; then
            echo "site_url=https://${CF_DOMAIN}" >> "$GITHUB_OUTPUT"
          else
            echo "site_url=" >> "$GITHUB_OUTPUT"
          fi

  # ── Deploy ──────────────────────────────────────────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [ci-check, check-env]
    environment: production
    if: needs.check-env.outputs.deployed == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "yarn"
          cache-dependency-path: frontend/yarn.lock

      - name: Build
        run: |
          cd frontend
          yarn install --frozen-lockfile
          yarn build
        env:
          REACT_APP_SITE_URL: ${{ needs.check-env.outputs.site_url }}
          CI: true

      - name: Deploy to S3
        env:
          S3_BUCKET: ${{ needs.check-env.outputs.s3_bucket }}
        run: |
          echo "📦 Deploying to s3://${S3_BUCKET}/"

          # Hashed assets — immutable, long cache
          aws s3 sync frontend/build/ "s3://${S3_BUCKET}/" \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "index.html" \
            --exclude "asset-manifest.json" \
            --exclude "service-worker.js" \
            --region "$AWS_REGION"

          # index.html — never cached
          aws s3 cp frontend/build/index.html "s3://${S3_BUCKET}/index.html" \
            --cache-control "no-cache, no-store, must-revalidate" \
            --content-type "text/html" \
            --region "$AWS_REGION"

          if [[ -f frontend/build/asset-manifest.json ]]; then
            aws s3 cp frontend/build/asset-manifest.json "s3://${S3_BUCKET}/asset-manifest.json" \
              --cache-control "no-cache, no-store, must-revalidate" \
              --content-type "application/json" \
              --region "$AWS_REGION"
          fi

          # Production robots.txt
          SITE_URL="${{ needs.check-env.outputs.site_url }}"
          {
            echo "User-agent: *"
            echo "Allow: /"
            if [[ -n "$SITE_URL" ]]; then
              echo ""
              echo "Sitemap: ${SITE_URL}/sitemap.xml"
            fi
          } > /tmp/robots-prod.txt

          aws s3 cp /tmp/robots-prod.txt "s3://${S3_BUCKET}/robots.txt" \
            --cache-control "no-cache, no-store, must-revalidate" \
            --content-type "text/plain" \
            --region "$AWS_REGION"

          echo "✅ Deployed to S3"

      - name: Invalidate CloudFront
        env:
          CF_DIST_ID: ${{ needs.check-env.outputs.cf_dist_id }}
        run: |
          if [[ -n "$CF_DIST_ID" && "$CF_DIST_ID" != "None" ]]; then
            INVALIDATION_ID=$(aws cloudfront create-invalidation \
              --distribution-id "$CF_DIST_ID" \
              --paths "/index.html" "/asset-manifest.json" "/service-worker.js" "/robots.txt" \
              --query "Invalidation.Id" --output text)
            echo "🔄 CloudFront invalidation: ${INVALIDATION_ID}"
          else
            echo "⏭️  No CloudFront distribution — skipping invalidation"
          fi

      - name: Smoke test
        env:
          SITE_URL: ${{ needs.check-env.outputs.site_url }}
        run: |
          if [[ -z "$SITE_URL" ]]; then
            echo "⏭️  No public URL — skipping smoke test"
            exit 0
          fi
          sleep 10
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            "${SITE_URL}/" --max-time 30 --retry 3 --retry-delay 10 || echo "000")
          if [[ "$HTTP_CODE" =~ ^(200|301|302)$ ]]; then
            echo "✅ Site is live (HTTP ${HTTP_CODE})"
          else
            echo "⚠️  Unexpected HTTP ${HTTP_CODE} — CloudFront may still be propagating"
          fi

      - name: Deployment summary
        if: always()
        env:
          SITE_URL: ${{ needs.check-env.outputs.site_url }}
        run: |
          echo "## Production Deployment Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Item | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Environment | \`production\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Commit | \`${{ github.sha }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Tag | \`${{ github.ref_name }}\` |" >> "$GITHUB_STEP_SUMMARY"
          if [[ -n "$SITE_URL" ]]; then
            echo "| Site URL | ${SITE_URL} |" >> "$GITHUB_STEP_SUMMARY"
          fi
