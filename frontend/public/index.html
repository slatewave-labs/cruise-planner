<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <!-- Favicon: SVG for modern browsers, ICO fallback for legacy -->
  <link rel="icon" href="%PUBLIC_URL%/favicon.svg" type="image/svg+xml" />
  <link rel="icon" href="%PUBLIC_URL%/favicon.ico" sizes="32x32" />
  <link rel="apple-touch-icon" href="%PUBLIC_URL%/apple-touch-icon.png" />
  <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5" />
  <meta name="theme-color" content="#0F172A" />

  <!-- Primary SEO meta -->
  <title>ShoreExplorer — AI Cruise Port Day Planner | Shore Excursion Itineraries</title>
  <meta name="description" content="Plan your perfect cruise port day with ShoreExplorer. AI-powered shore excursion itineraries for every port of call — personalised activities, real-time weather, interactive maps, and walking routes. Free cruise day planner." />
  <meta name="keywords" content="cruise port planner, shore excursion planner, cruise day plan, port of call itinerary, cruise excursion ideas, days ashore planner, cruise port activities, cruise ship port guide, AI cruise planner, cruise port day trip, cruise shore day, cruise port walking tour, Mediterranean cruise ports, Caribbean cruise excursions" />
  <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1" />
  <link rel="canonical" href="%REACT_APP_SITE_URL%/" />

  <!-- Open Graph (Facebook, WhatsApp, Slack previews) -->
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="ShoreExplorer" />
  <meta property="og:title" content="ShoreExplorer — AI Cruise Port Day Planner | Plan Your Shore Excursions" />
  <meta property="og:description" content="AI-powered cruise port day planner. Get a personalised shore excursion itinerary for every port of call — with real-time weather, interactive maps, and exportable walking routes." />
  <meta property="og:image" content="%REACT_APP_SITE_URL%/icon-512.png" />
  <meta property="og:image:width" content="512" />
  <meta property="og:image:height" content="512" />
  <meta property="og:image:alt" content="ShoreExplorer logo — anchor icon on coral background" />
  <meta property="og:url" content="%REACT_APP_SITE_URL%" />
  <meta property="og:locale" content="en_GB" />

  <!-- Twitter / X Card -->
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="ShoreExplorer — AI Cruise Port Day Planner" />
  <meta name="twitter:description" content="Plan your perfect day ashore. AI-powered cruise port itineraries with weather, maps, and personalised shore excursion routes." />
  <meta name="twitter:image" content="%REACT_APP_SITE_URL%/icon-512.png" />

  <!-- Structured Data: WebSite + Organization (JSON-LD) -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@graph": [
      {
        "@type": "WebSite",
        "name": "ShoreExplorer",
        "alternateName": "Shore Explorer Cruise Day Planner",
        "url": "%REACT_APP_SITE_URL%/",
        "description": "AI-powered cruise port day planner that creates personalised shore excursion itineraries with real-time weather and interactive maps.",
        "potentialAction": {
          "@type": "SearchAction",
          "target": "%REACT_APP_SITE_URL%/trips/new",
          "name": "Plan a cruise port day"
        }
      },
      {
        "@type": "Organization",
        "name": "Slatewave Labs",
        "url": "https://slatewave-labs.com",
        "logo": "%REACT_APP_SITE_URL%/icon-512.png"
      },
      {
        "@type": "WebApplication",
        "name": "ShoreExplorer",
        "url": "%REACT_APP_SITE_URL%/",
        "applicationCategory": "TravelApplication",
        "operatingSystem": "Any",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "USD"
        },
        "description": "Free AI-powered cruise port day planner. Create personalised shore excursion itineraries with weather forecasts, interactive maps, and optimised walking routes for every port of call."
      }
    ]
  }
  </script>

  <!-- Preconnect to third-party origins for faster resource loading -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preconnect" href="https://images.unsplash.com" />

  <!-- Preload hero image so the browser fetches the LCP resource immediately -->
  <link rel="preload" as="image" fetchpriority="high" href="https://images.unsplash.com/photo-1639369480706-ffda22f88dec?w=1400&q=80" />

  <!-- Fonts: load non-render-blocking (display=swap already ensures text is visible) -->
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" media="print" onload="this.media='all'" />

  <!-- Leaflet CSS: non-render-blocking (only needed on map pages, not landing) -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" media="print" onload="this.media='all'" />

  <!-- Google Analytics (gtag.js) — loaded only when measurement ID is configured -->
  <script>
    (function() {
      var id = '%REACT_APP_GA_MEASUREMENT_ID%';
      if (!id || id.charAt(0) === '%') return;
      var s = document.createElement('script');
      s.async = true;
      s.src = 'https://www.googletagmanager.com/gtag/js?id=' + id;
      document.head.appendChild(s);
      window.dataLayer = window.dataLayer || [];
      window.gtag = function() { window.dataLayer.push(arguments); };
      window.gtag('js', new Date());
      window.gtag('config', id, { send_page_view: false, anonymize_ip: true });
    })();
  </script>
</head>
<body>
  <noscript>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    ShoreExplorer is an AI-powered cruise port day planner. Plan personalised shore excursion itineraries for every port of call with real-time weather, interactive maps, and optimised walking routes. Enable JavaScript for the full experience.
  </noscript>
  <div id="root"></div>
</body>
</html>
