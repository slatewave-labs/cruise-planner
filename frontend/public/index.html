<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <!-- Favicon: SVG for modern browsers, ICO fallback for legacy -->
  <link rel="icon" href="%PUBLIC_URL%/favicon.svg" type="image/svg+xml" />
  <link rel="icon" href="%PUBLIC_URL%/favicon.ico" sizes="32x32" />
  <link rel="apple-touch-icon" href="%PUBLIC_URL%/apple-touch-icon.png" />
  <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5" />
  <meta name="theme-color" content="#0F172A" />

  <!-- Primary SEO meta -->
  <title>ShoreExplorer — AI Cruise Port Day Planner</title>
  <meta name="description" content="ShoreExplorer uses AI to build a personalised day itinerary for every cruise port you visit — weather, maps, and timings included. Free to use." />
  <meta name="robots" content="index, follow" />

  <!-- Open Graph (Facebook, WhatsApp, Slack previews) -->
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="ShoreExplorer" />
  <meta property="og:title" content="ShoreExplorer — Plan Your Perfect Day Ashore" />
  <meta property="og:description" content="AI-powered cruise port day planner. Get a personalised itinerary for every port of call — with live weather, interactive maps, and exportable routes." />
  <meta property="og:image" content="%REACT_APP_SITE_URL%/icon-512.png" />
  <meta property="og:image:width" content="512" />
  <meta property="og:image:height" content="512" />
  <meta property="og:image:alt" content="ShoreExplorer logo — anchor icon on coral background" />
  <meta property="og:url" content="%REACT_APP_SITE_URL%" />

  <!-- Twitter / X Card -->
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="ShoreExplorer — Plan Your Perfect Day Ashore" />
  <meta name="twitter:description" content="AI-powered cruise port day planner. Personalised itineraries with live weather and interactive maps." />
  <meta name="twitter:image" content="%REACT_APP_SITE_URL%/icon-512.png" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />

  <!-- Google Analytics (gtag.js) — loaded only when measurement ID is configured -->
  <script>
    (function() {
      var id = '%REACT_APP_GA_MEASUREMENT_ID%';
      if (!id || id.charAt(0) === '%') return;
      var s = document.createElement('script');
      s.async = true;
      s.src = 'https://www.googletagmanager.com/gtag/js?id=' + id;
      document.head.appendChild(s);
      window.dataLayer = window.dataLayer || [];
      window.gtag = function() { window.dataLayer.push(arguments); };
      window.gtag('js', new Date());
      window.gtag('config', id, { send_page_view: false, anonymize_ip: true });
    })();
  </script>
</head>
<body>
  <noscript>You need to enable JavaScript to run ShoreExplorer.</noscript>
  <div id="root"></div>
</body>
</html>
