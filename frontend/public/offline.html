<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#0F172A" />
  <title>Offline — ShoreExplorer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background-color: #F5F5F4;
      color: #1C1917;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }
    .icon {
      width: 80px;
      height: 80px;
      margin-bottom: 1.5rem;
      opacity: 0.6;
    }
    h1 {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 1.75rem;
      font-weight: 700;
      color: #0F172A;
      margin-bottom: 0.75rem;
    }
    p {
      font-size: 1rem;
      line-height: 1.6;
      color: #57534E;
      max-width: 28rem;
      margin-bottom: 1.5rem;
    }
    .retry-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background-color: #0F172A;
      color: #F8FAFC;
      border: none;
      border-radius: 9999px;
      padding: 0.875rem 2rem;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      min-height: 48px;
      transition: background-color 0.2s;
    }
    .retry-btn:hover { background-color: #1E293B; }
    .retry-btn:focus { outline: 2px solid #F43F5E; outline-offset: 2px; }
    .tip {
      margin-top: 2rem;
      font-size: 0.875rem;
      color: #A8A29E;
    }
  </style>
</head>
<body>
  <!-- Anchor icon (inline SVG to avoid network dependency) -->
  <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="#0F172A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="5" r="3"/>
    <line x1="12" y1="22" x2="12" y2="8"/>
    <path d="M5 12H2a10 10 0 0 0 20 0h-3"/>
  </svg>

  <h1>You're Offline</h1>
  <p>
    It looks like you've lost your internet connection.
    Don't worry — any saved trip plans are still available on your device.
  </p>

  <button class="retry-btn" onclick="window.location.reload()">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/>
      <path d="M3 22v-6h6"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/>
    </svg>
    Try Again
  </button>

  <p class="tip">
    💡 Tip: Plans you've already generated are cached and viewable offline.
  </p>
</body>
</html>
